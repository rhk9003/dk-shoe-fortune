<title>DK 夏日抽鞋占卜 — 91app 嵌入範例</title>

  h1{font-size:1rem;font-weight:700;margin:0 0 6px}
  p{font-size:.86rem;color:#777;margin:0 0 16px}
  iframe{width:100%;height:720px;border:0;display:block;border-radius:16px;

      src="https://rhk9003.github.io/dk-shoe-fortune/?v=7"
